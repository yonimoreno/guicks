<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favorites — Guicks</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f2f7;
    --surface: #ffffff;
    --surface2: #f7f8fc;
    --border: rgba(0,0,0,0.07);
    --text: #0d0d1a;
    --text-2: #4a4a6a;
    --text-3: #9090aa;
    --accent: #f5a623;
    --accent-light: #fff8ec;
    --radius: 18px;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
    --shadow-md: 0 6px 24px rgba(0,0,0,0.09);
    --shadow-lg: 0 16px 48px rgba(0,0,0,0.13);
  }

  html, body {
    width: 100%; min-height: 100%;
    font-family: 'Outfit', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 10% 0%, rgba(245,166,35,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 90% 100%, rgba(91,46,232,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .shell {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    max-width: 680px; margin: 0 auto;
  }

  /* ── Status bar ── */
  .statusbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 0;
    font-size: 13px; font-weight: 700; color: var(--text);
  }
  .statusbar .time { font-size: 16px; font-weight: 800; }
  .statusbar .icons { display: flex; gap: 5px; align-items: center; }
  .statusbar .icons svg { width: 16px; height: 16px; fill: var(--text); }

  /* ── Top nav ── */
  .topnav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px 0;
  }
  .back-btn {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--accent); font-size: 15px; font-weight: 600;
    text-decoration: none; background: none; border: none;
    cursor: pointer; padding: 6px 10px 6px 4px;
    border-radius: 10px; transition: background 0.15s;
  }
  .back-btn:hover { background: var(--accent-light); }
  .back-btn svg { width: 18px; height: 18px; fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  /* ── App header ── */
  .app-header {
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 24px 16px; text-align: center;
  }
  .app-icon {
    width: 72px; height: 72px; border-radius: 18px;
    background: linear-gradient(145deg, #e8820a, #f5c842);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
    box-shadow: 0 8px 28px rgba(245,166,35,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .app-icon svg { width: 38px; height: 38px; }
  .app-header h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 4px; }
  .app-header p { font-size: 13px; color: var(--text-3); }

  /* ── Add bar ── */
  .add-card {
    margin: 0 16px 14px;
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    border: 1px solid var(--border);
    padding: 16px;
  }
  .add-row {
    display: flex; gap: 10px; align-items: center;
  }
  .add-input {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px; font-weight: 400;
    padding: 11px 14px; border-radius: 12px;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  .add-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(245,166,35,0.15);
    background: white;
  }
  .add-input::placeholder { color: var(--text-3); }
  .add-btn {
    background: linear-gradient(135deg, #e8820a, #f5c842);
    color: white; border: none; border-radius: 12px;
    padding: 11px 20px; font-family: 'Outfit', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: all 0.18s; white-space: nowrap;
    box-shadow: 0 3px 12px rgba(245,166,35,0.35);
  }
  .add-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(245,166,35,0.45); }
  .add-btn:active { transform: translateY(0); }
  .add-btn:disabled { opacity: 0.6; pointer-events: none; }

  /* Category picker (shown after URL typed) */
  .cat-row {
    display: none; flex-wrap: wrap; gap: 6px; margin-top: 12px;
  }
  .cat-row.visible { display: flex; }
  .cat-chip {
    padding: 5px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--surface2); color: var(--text-2);
    transition: all 0.15s;
  }
  .cat-chip:hover { border-color: var(--accent); color: var(--accent); }
  .cat-chip.selected { color: white; border-color: transparent; }

  /* ── Search bar ── */
  .search-wrap {
    margin: 0 16px 14px;
    position: relative;
  }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    padding: 11px 14px 11px 40px;
    border-radius: 14px;
    outline: none;
    box-shadow: var(--shadow-sm);
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,166,35,0.12); }
  .search-input::placeholder { color: var(--text-3); }
  .search-icon {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; opacity: 0.4; pointer-events: none;
  }

  /* ── Filter tabs ── */
  .filter-wrap {
    padding: 0 16px 14px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .filter-wrap::-webkit-scrollbar { display: none; }
  .filter-tabs {
    display: flex; gap: 8px; width: max-content;
  }
  .filter-tab {
    padding: 7px 16px; border-radius: 20px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--surface); color: var(--text-2);
    white-space: nowrap; transition: all 0.15s;
    box-shadow: var(--shadow-sm);
  }
  .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
  .filter-tab.active { color: white; border-color: transparent; box-shadow: 0 3px 10px rgba(0,0,0,0.15); }

  /* ── Bookmarks ── */
  .bookmarks-wrap {
    padding: 0 16px; flex: 1;
  }

  .category-group { margin-bottom: 22px; }
  .category-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px; padding: 0 4px;
  }
  .category-emoji { font-size: 16px; }
  .category-name {
    font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.7px;
    color: var(--text-3);
  }
  .category-count {
    font-size: 11px; font-weight: 600;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-3);
    padding: 1px 7px; border-radius: 10px;
  }

  .bookmarks-grid {
    display: flex; flex-direction: column; gap: 8px;
  }

  /* ── Bookmark card ── */
  .bookmark-card {
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    display: flex; align-items: center; gap: 14px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    animation: slideIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .bookmark-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: rgba(245,166,35,0.3);
  }
  .bookmark-card:active { transform: scale(0.98); }

  .bookmark-favicon {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden;
  }
  .bookmark-favicon img {
    width: 28px; height: 28px; object-fit: contain;
    border-radius: 4px;
  }
  .bookmark-favicon .fallback {
    font-size: 18px; line-height: 1;
  }

  .bookmark-info { flex: 1; min-width: 0; }
  .bookmark-title {
    font-size: 14px; font-weight: 700;
    color: var(--text); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .bookmark-url {
    font-size: 11px; color: var(--text-3);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 1px;
  }

  .bookmark-actions {
    display: flex; gap: 6px; align-items: center; flex-shrink: 0;
  }
  .bm-pin-btn, .bm-del-btn {
    width: 30px; height: 30px; border-radius: 8px;
    border: none; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: all 0.15s; background: var(--surface2);
  }
  .bm-pin-btn { color: var(--text-3); }
  .bm-pin-btn.pinned { background: var(--accent-light); color: var(--accent); }
  .bm-pin-btn:hover { background: var(--accent-light); color: var(--accent); }
  .bm-del-btn { color: var(--text-3); }
  .bm-del-btn:hover { background: #fee; color: #e53; }
  .bm-pin-btn svg, .bm-del-btn svg { width: 14px; height: 14px; }

  /* Pin indicator */
  .bookmark-card.pinned { border-color: rgba(245,166,35,0.35); background: #fffdf8; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center; padding: 48px 24px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .empty-icon { font-size: 48px; }
  .empty-title { font-size: 18px; font-weight: 700; color: var(--text-2); }
  .empty-sub { font-size: 13px; color: var(--text-3); line-height: 1.6; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: rgba(20,20,35,0.92); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff; font-size: 13px; font-weight: 500;
    padding: 10px 20px; border-radius: 20px;
    pointer-events: none; opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Footer ── */
  .footer { text-align: center; padding: 16px 0 24px; font-size: 11px; color: var(--text-3); letter-spacing: 0.04em; }

  /* ── Custom category modal ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px;
    width: 100%; max-width: 680px;
    transform: translateY(40px);
    transition: transform 0.3s cubic-bezier(0.34,1.4,0.64,1);
    box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border); margin: 0 auto 20px;
  }
  .modal-title {
    font-size: 18px; font-weight: 800; margin-bottom: 20px;
    letter-spacing: -0.4px;
  }

  .modal-field { margin-bottom: 14px; }
  .modal-label {
    font-size: 12px; font-weight: 600; color: var(--text-2);
    margin-bottom: 6px; display: block;
  }
  .modal-input {
    width: 100%; background: var(--surface2);
    border: 1.5px solid var(--border); color: var(--text);
    font-family: 'Outfit', sans-serif; font-size: 14px;
    padding: 11px 14px; border-radius: 12px; outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  .modal-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(245,166,35,0.15);
    background: white;
  }

  /* Emoji grid */
  .emoji-grid {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .emoji-opt {
    width: 38px; height: 38px; border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .emoji-opt:hover { border-color: var(--accent); transform: scale(1.1); }
  .emoji-opt.selected { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 2px rgba(245,166,35,0.3); }

  /* Color swatches */
  .color-grid {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .color-swatch {
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; border: 2.5px solid transparent;
    transition: all 0.15s; position: relative;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: var(--text); box-shadow: 0 0 0 2px white, 0 0 0 4px var(--text); }

  .modal-actions {
    display: flex; gap: 10px; margin-top: 20px;
  }
  .modal-btn {
    flex: 1; padding: 13px; border-radius: 14px;
    font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; border: none; transition: all 0.18s;
  }
  .modal-btn.cancel {
    background: var(--surface2); color: var(--text-2);
    border: 1.5px solid var(--border);
  }
  .modal-btn.cancel:hover { background: var(--bg); }
  .modal-btn.confirm {
    background: linear-gradient(135deg, #e8820a, #f5c842);
    color: white;
    box-shadow: 0 3px 12px rgba(245,166,35,0.35);
  }
  .modal-btn.confirm:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(245,166,35,0.45); }

  /* Manage categories section */
  .manage-cats-btn {
    display: flex; align-items: center; gap: 6px;
    background: none; border: 1.5px dashed var(--border);
    border-radius: 20px; padding: 5px 12px;
    font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600;
    color: var(--text-3); cursor: pointer; transition: all 0.15s;
  }
  .manage-cats-btn:hover { border-color: var(--accent); color: var(--accent); }

  .custom-cat-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .custom-cat-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface2); border-radius: 12px;
    padding: 10px 14px; border: 1px solid var(--border);
  }
  .custom-cat-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .custom-cat-name { flex: 1; font-size: 14px; font-weight: 600; }
  .custom-cat-del {
    background: none; border: none; cursor: pointer;
    color: var(--text-3); font-size: 16px; padding: 2px 6px;
    border-radius: 6px; transition: all 0.15s;
  }
  .custom-cat-del:hover { background: #fee; color: #e53; }

  /* ── Cookie banner ── */
  .cookie-banner {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    z-index: 200; box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  }
  .cookie-banner p { font-size: 12px; color: var(--text-2); line-height: 1.5; }
  .cookie-btn {
    flex-shrink: 0; background: linear-gradient(135deg, #e8820a, #f5c842);
    color: white; border: none; border-radius: 20px;
    padding: 8px 18px; font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: 'Outfit', sans-serif;
  }
</style>

<body>

<div class="shell">

  <!-- Status bar -->
  <div class="statusbar">
    <span class="time" id="clock">9:41</span>
    <div class="icons">
      <svg viewBox="0 0 24 24"><rect x="1" y="14" width="3" height="7" rx="1"/><rect x="6" y="10" width="3" height="11" rx="1"/><rect x="11" y="6" width="3" height="15" rx="1"/><rect x="16" y="2" width="3" height="19" rx="1" opacity="0.3"/></svg>
      <svg viewBox="0 0 24 24"><path d="M12 18.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3zm-4.95-2.55a7 7 0 019.9 0l1.41-1.41a9 9 0 00-12.72 0l1.41 1.41zm-3.54-3.54a12 12 0 0116.98 0l1.41-1.41A14 14 0 003.1 10.99l1.41 1.42z"/></svg>
      <svg viewBox="0 0 24 24"><rect x="1" y="7" width="18" height="10" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="2" y="8" width="14" height="8" rx="1.2" fill="currentColor"/><path d="M20 10v4a2 2 0 000-4z"/></svg>
    </div>
  </div>

  <!-- Top nav -->
  <div class="topnav">
    <a class="back-btn" href="./index.html">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      guicks
    </a>
    <div style="width:80px"></div>
  </div>

  <!-- App header -->
  <div class="app-header">
    <div class="app-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="white" stroke="white" stroke-width="0.5" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1 data-i18n="favTitle">Favorites</h1>
    <p>Your personal bookmarks, always at hand</p>
  </div>

  <!-- Add URL -->
  <div class="add-card">
    <div class="add-row">
      <input class="add-input" id="urlInput" type="url" placeholder="Paste a URL — https://example.com" data-i18n-ph="favAddUrl" autocomplete="off" oninput="onUrlInput(this.value)" onkeydown="if(event.key==='Enter')addBookmark()"/>
      <button class="add-btn" id="addBtn" onclick="addBookmark()">Add ＋</button>
    </div>
    <div class="cat-row" id="catRow">
      <span style="font-size:12px;color:var(--text-3);font-weight:600;align-self:center;margin-right:4px;">Category:</span>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="6"/><line x1="15.5" y1="15.5" x2="20" y2="20"/></svg>
    <input class="search-input" id="searchInput" placeholder="Search favorites…" data-i18n-ph="favSearchPlaceholder" oninput="renderAll()" />
  </div>

  <!-- Filter tabs -->
  <div class="filter-wrap">
    <div class="filter-tabs" id="filterTabs"></div>
  </div>

  <!-- Bookmarks -->
  <div class="bookmarks-wrap" id="bookmarksWrap"></div>

  <div class="footer">© Copyright 2026 Yoni Moreno</div>
</div>

<div class="toast" id="toast"></div>

<!-- Custom Category Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Cookie banner -->
<div class="cookie-banner" id="cookieBanner">
  <p>🍪 This website uses cookies to analyze traffic with Google Analytics. By continuing, you accept our use of cookies.</p>
  <button class="cookie-btn" onclick="acceptCookies()">Accept</button>
</div>

<script>
// ── Clock ──
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}
updateClock(); setInterval(updateClock, 10000);

// ── Cookie ──
if (localStorage.getItem('cookiesAccepted')) document.getElementById('cookieBanner').style.display = 'none';
function acceptCookies() {

function getDomain(url) {
  try {
    const u = new URL(url.startsWith('http') ? url : 'https://' + url);
    return u.hostname.replace('www.', '');
  } catch { return url.toLowerCase(); }
}

function categorize(url) {
  const domain = getDomain(url).toLowerCase();
  if (DOMAIN_MAP[domain]) return DOMAIN_MAP[domain];
  for (const key of Object.keys(DOMAIN_MAP)) {
    if (domain.endsWith('.' + key) || domain === key) return DOMAIN_MAP[key];
  }
  for (const [keywords, cat] of KEYWORD_CATS) {
    if (keywords.some(kw => domain.includes(kw))) return cat;
  }
  return 'other';
}

function getFaviconUrl(url) {
  return `https://www.google.com/s2/favicons?domain=${getDomain(url)}&sz=64`;
}

function extractTitle(url) {
  try {
    const d = getDomain(url);
    return d.split('.')[0].charAt(0).toUpperCase() + d.split('.')[0].slice(1);
  } catch { return url; }
}

// ── State ──
const STORAGE_KEY = 'guicks_favorites_v1';
let bookmarks = [];
let activeFilter = 'all';
let selectedCat = null;

function load() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) bookmarks = JSON.parse(saved);
  } catch { bookmarks = []; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks)); }

// ── New Category Modal ──
const EMOJI_OPTIONS = ['📁','🌟','🔥','💡','🎯','🏠','🎨','🧪','🧘','🏋️','📷','🎭','🌍','🚀','🐾','🌱','💎','🎪','🧩','🎸','🍀','⚡','🌈','🦋','🏆','🎓','💼','🔐','🛒','🧠'];
const COLOR_OPTIONS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e91e63','#ff5722','#795548','#607d8b','#34495e','#16a085','#27ae60','#2980b9','#8e44ad','#f39c12','#d35400'];

let newCatEmoji = '📁';
let newCatColor = '#3498db';

function openNewCategoryModal() {
  newCatEmoji = '📁';
  newCatColor = '#3498db';
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-title">✨ New Category</div>
    <div class="modal-field">
      <label class="modal-label">Name</label>
      <input class="modal-input" id="newCatName" placeholder="e.g. Recipes, Work, Family…" maxlength="30" />
    </div>
    <div class="modal-field">
      <label class="modal-label">Icon</label>
      <div class="emoji-grid" id="emojiGrid">
        ${EMOJI_OPTIONS.map(e => `<div class="emoji-opt ${e === newCatEmoji ? 'selected' : ''}" onclick="pickEmoji('${e}')">${e}</div>`).join('')}
      </div>
    </div>
    <div class="modal-field">
      <label class="modal-label">Color</label>
      <div class="color-grid" id="colorGrid">
        ${COLOR_OPTIONS.map(c => `<div class="color-swatch ${c === newCatColor ? 'selected' : ''}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('')}
      </div>
    </div>

}

function pickEmoji(e) {
  newCatEmoji = e;
  document.querySelectorAll('.emoji-opt').forEach(el => el.classList.toggle('selected', el.textContent === e));
}

function pickColor(c) {
  newCatColor = c;
  document.querySelectorAll('.color-swatch').forEach(el => {
    el.classList.toggle('selected', el.style.background === c || el.style.backgroundColor === c);
  });
}

function saveNewCategory() {
  const name = document.getElementById('newCatName')?.value.trim();
  if (!name) { showToast('Please enter a category name'); return; }
  const key = 'custom_' + name.toLowerCase().replace(/\s+/g,'_') + '_' + Date.now();
  customCategories[key] = { label: name, emoji: newCatEmoji, color: newCatColor };
  saveCustomCats();
  closeModal();
  showToast(`${newCatEmoji} "${name}" category created!`);
  // If we're in the cat picker, refresh it
  if (selectedCat !== null) renderCatPicker(selectedCat);
  renderAll();
}

// ── Manage Categories Modal ──
function openManageCatsModal() {
  renderManageModal();
  openModal();
}

function renderManageModal() {
  const customs = Object.entries(customCategories);
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-title">🗂 Manage Categories</div>
    ${customs.length === 0 ? `<p style="color:var(--text-3);font-size:13px;margin-bottom:16px;">No custom categories yet.</p>` : `
    <div class="custom-cat-list">
      ${customs.map(([key, cat]) => `
        <div class="custom-cat-row">
          <div class="custom-cat-dot" style="background:${cat.color}"></div>
          <span style="font-size:18px">${cat.emoji}</span>
          <span class="custom-cat-name">${escHtml(cat.label)}</span>
          <button class="custom-cat-del" onclick="deleteCustomCat('${key}')" title="Delete">🗑</button>
        </div>`).join('')}
    </div>`}
    <button class="modal-btn confirm" style="width:100%" onclick="openNewCategoryModal()">＋ Create New Category</button>
    <div style="margin-top:10px">
      <button class="modal-btn cancel" style="width:100%" onclick="closeModal()">Done</button>
    </div>
  `;
}

function deleteCustomCat(key) {
  const cat = customCategories[key];
  if (!cat) return;
  // Re-assign bookmarks in this category to 'other'
  bookmarks.forEach(b => { if (b.category === key) b.category = 'other'; });
  save();
  delete customCategories[key];
  saveCustomCats();
  if (activeFilter === key) activeFilter = 'all';
  showToast(`"${cat.label}" deleted`);
  renderManageModal();
  renderAll();
}

// ── Category picker ──
function onUrlInput(val) {
  const catRow = document.getElementById('catRow');
  if (!val.trim()) { catRow.classList.remove('visible'); selectedCat = null; return; }
  const auto = categorize(val);
  selectedCat = auto;
  renderCatPicker(auto);
  catRow.classList.add('visible');
}

function renderCatPicker(selected) {
  const catRow = document.getElementById('catRow');
  const cats = getAllCategories();
  const chips = Object.entries(cats).map(([key, cat]) => `
    <span class="cat-chip ${selected === key ? 'selected' : ''}"
      style="${selected === key ? `background:${cat.color}` : ''}"
      onclick="selectCat('${key}')">${cat.emoji} ${cat.label}</span>
  `).join('');
  const newBtn = `<button class="manage-cats-btn" onclick="openNewCategoryModal()">＋ New</button>`;
  catRow.innerHTML = `<span style="font-size:12px;color:var(--text-3);font-weight:600;align-self:center;margin-right:4px;">Category:</span>${chips}${newBtn}`;
}

function selectCat(key) {
  selectedCat = key;
  renderCatPicker(key);
}

// ── Add bookmark ──
function addBookmark() {
  let url = document.getElementById('urlInput').value.trim();
  if (!url) { showToast('Please enter a URL'); return; }
  if (!url.startsWith('http')) url = 'https://' + url;
  try { new URL(url); } catch { showToast('Invalid URL'); return; }
  if (bookmarks.find(b => b.url === url)) { showToast('Already in favorites!'); return; }

  const cat = selectedCat || categorize(url);
  const cats = getAllCategories();
  const bm = {
    id: Date.now(), url,
    title: extractTitle(url), category: cat,
    favicon: getFaviconUrl(url), pinned: false, addedAt: Date.now(),
  };
  bookmarks.unshift(bm);
  save();
  document.getElementById('urlInput').value = '';
  document.getElementById('catRow').classList.remove('visible');
  selectedCat = null;
  const catInfo = cats[cat] || cats.other;
  showToast(`${catInfo.emoji} Added to ${catInfo.label}!`);
  renderAll();
}

// ── Toggle pin ──
function togglePin(id, e) {
  e.stopPropagation();
  const bm = bookmarks.find(b => b.id === id);
  if (!bm) return;
  bm.pinned = !bm.pinned;
  save(); renderAll();
  showToast(bm.pinned ? '📌 Pinned!' : 'Unpinned');
}

// ── Delete ──
function deleteBookmark(id, e) {
  e.stopPropagation();
  bookmarks = bookmarks.filter(b => b.id !== id);
  save(); renderAll();
  showToast('Removed from favorites');
}

// ── Open ──
function openBookmark(url) { window.open(url, '_blank'); }

// ── Render ──
function renderAll() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = bookmarks.filter(bm => {
    const matchSearch = !query || bm.title.toLowerCase().includes(query) || bm.url.toLowerCase().includes(query);
    const matchFilter = activeFilter === 'all' || bm.category === activeFilter;
    return matchSearch && matchFilter;
  });
  filtered.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
  renderFilterTabs();
  renderBookmarks(filtered, query);
}

function renderFilterTabs() {
  const cats = getAllCategories();
  const usedCats = [...new Set(bookmarks.map(b => b.category))];
  const tabs = [
    `<div class="filter-tab ${activeFilter === 'all' ? 'active' : ''}"
      style="${activeFilter === 'all' ? 'background:linear-gradient(135deg,#e8820a,#f5c842)' : ''}"
      onclick="setFilter('all')">⭐ All (${bookmarks.length})</div>`,
    ...usedCats.map(cat => {
      const c = cats[cat] || cats.other;
      const count = bookmarks.filter(b => b.category === cat).length;
      const isActive = activeFilter === cat;
      return `<div class="filter-tab ${isActive ? 'active' : ''}"
        style="${isActive ? `background:${c.color}` : ''}"
        onclick="setFilter('${cat}')">${c.emoji} ${c.label} (${count})</div>`;
    }),
    `<div class="filter-tab" style="border-style:dashed" onclick="openManageCatsModal()">⚙️ Categories</div>`
  ];
  document.getElementById('filterTabs').innerHTML = tabs.join('');
}

function setFilter(cat) { activeFilter = cat; renderAll(); }

function renderBookmarks(items, query) {
  const cats = getAllCategories();
  const wrap = document.getElementById('bookmarksWrap');
  if (!items.length) {
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${bookmarks.length === 0 ? '⭐' : '🔍'}</div>
        <div class="empty-title">${bookmarks.length === 0 ? 'No favorites yet' : 'No results found'}</div>
        <div class="empty-sub">${bookmarks.length === 0 ? 'Paste a URL above to add your first favorite!' : `Nothing matched "${query}"`}</div>
      </div>`;
    return;
  }

  if (activeFilter === 'all' && !query) {
    const pinned = items.filter(b => b.pinned);
    const byCat = {};
    items.filter(b => !b.pinned).forEach(b => {
      if (!byCat[b.category]) byCat[b.category] = [];
      byCat[b.category].push(b);
    });
    let html = '';
    if (pinned.length) {
      html += `<div class="category-group">
        <div class="category-header">
          <span class="category-emoji">📌</span>
          <span class="category-name">Pinned</span>
          <span class="category-count">${pinned.length}</span>
        </div>
        <div class="bookmarks-grid">${pinned.map(bm => bookmarkHTML(bm, cats)).join('')}</div>
      </div>`;
    }
    for (const [cat, bms] of Object.entries(byCat)) {
      const c = cats[cat] || cats.other;
      html += `<div class="category-group">
        <div class="category-header">
          <span class="category-emoji">${c.emoji}</span>
          <span class="category-name">${c.label}</span>
          <span class="category-count">${bms.length}</span>
        </div>
        <div class="bookmarks-grid">${bms.map(bm => bookmarkHTML(bm, cats)).join('')}</div>
      </div>`;
    }
    wrap.innerHTML = html;
  } else {
    wrap.innerHTML = `<div class="bookmarks-grid" style="margin-bottom:22px">${items.map(bm => bookmarkHTML(bm, cats)).join('')}</div>`;
  }
}

function bookmarkHTML(bm, cats) {
  const cat = cats[bm.category] || cats.other;
  return `
    <div class="bookmark-card ${bm.pinned ? 'pinned' : ''}" onclick="openBookmark('${escHtml(bm.url)}')">
      <div class="bookmark-favicon">
        <img src="${bm.favicon}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
        <span class="fallback" style="display:none">${cat.emoji}</span>
      </div>
      <div class="bookmark-info">
        <div class="bookmark-title">${escHtml(bm.title)}</div>
        <div class="bookmark-url">${escHtml(bm.url.replace(/^https?:\/\/(www\.)?/,''))}</div>
      </div>
      <div class="bookmark-actions" onclick="event.stopPropagation()">
        <button class="bm-pin-btn ${bm.pinned ? 'pinned' : ''}" onclick="togglePin(${bm.id},event)" title="${bm.pinned ? 'Unpin' : 'Pin'}">
          <svg viewBox="0 0 24 24" fill="${bm.pinned ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 6-9 13-9 13S3 16 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>
        </button>
        <button class="bm-del-btn" onclick="deleteBookmark(${bm.id},event)" title="Remove">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </div>`;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──
loadCustomCats();
load();
renderAll();
