<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather — Guicks</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0f2f7;
  --surface: #fff;
  --surface2: #f7f8fc;
  --border: rgba(0,0,0,0.07);
  --text: #0d0d1a;
  --text-2: #4a4a6a;
  --text-3: #9090aa;
  --radius: 20px;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-md: 0 6px 24px rgba(0,0,0,0.09);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.14);

  /* Dynamic sky vars — updated by JS */
  --sky1: #1a6dd4;
  --sky2: #5ba5f5;
  --sky3: #a8d4ff;
  --card-text: white;
}

html, body { width: 100%; min-height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); }

.shell { min-height: 100vh; display: flex; flex-direction: column; max-width: 680px; margin: 0 auto; }

/* ── Status bar ── */
.statusbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 24px 0;
  font-size: 13px; font-weight: 700; color: var(--text);
}
.statusbar .time { font-size: 16px; font-weight: 800; }
.statusbar .icons { display: flex; gap: 5px; align-items: center; }
.statusbar .icons svg { width: 16px; height: 16px; fill: var(--text); }

/* ── Top nav ── */
.topnav { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px 0; }
.back-btn {
  display: inline-flex; align-items: center; gap: 4px;
  color: #1a6dd4; font-size: 15px; font-weight: 600;
  text-decoration: none; background: none; border: none;
  cursor: pointer; padding: 6px 10px 6px 4px; border-radius: 10px; transition: background 0.15s;
}
.back-btn:hover { background: rgba(26,109,212,0.08); }
.back-btn svg { width: 18px; height: 18px; fill: none; stroke: #1a6dd4; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

/* ── Hero weather card ── */
.hero-card {
  margin: 14px 16px 0;
  border-radius: 24px;
  overflow: hidden;
  position: relative;
  min-height: 260px;
  background: linear-gradient(160deg, var(--sky1), var(--sky2) 55%, var(--sky3));
  box-shadow: var(--shadow-lg);
  transition: background 1.2s ease;
}

/* Animated clouds / elements */
.hero-bg {
  position: absolute; inset: 0; overflow: hidden; pointer-events: none;
}
.cloud {
  position: absolute; border-radius: 50px;
  background: rgba(255,255,255,0.12);
  animation: floatCloud linear infinite;
}
.cloud-1 { width: 120px; height: 36px; top: 30px; left: -140px; animation-duration: 22s; animation-delay: 0s; }
.cloud-2 { width: 80px; height: 24px; top: 60px; left: -100px; animation-duration: 30s; animation-delay: -10s; }
.cloud-3 { width: 160px; height: 40px; top: 80px; left: -180px; animation-duration: 26s; animation-delay: -6s; }
@keyframes floatCloud { from { transform: translateX(0); } to { transform: translateX(900px); } }

/* Rain drops */
.rain-wrap { position: absolute; inset: 0; display: none; }
.rain-wrap.active { display: block; }
.raindrop {
  position: absolute; width: 1.5px; border-radius: 2px;
  background: rgba(255,255,255,0.35);
  animation: rain linear infinite;
}
@keyframes rain { from { transform: translateY(-20px); opacity: 0.8; } to { transform: translateY(300px); opacity: 0; } }

/* Snow */
.snow-wrap { position: absolute; inset: 0; display: none; pointer-events: none; }
.snow-wrap.active { display: block; }
.snowflake {
  position: absolute; color: rgba(255,255,255,0.7); font-size: 12px;
  animation: snow linear infinite;
}
@keyframes snow { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(300px) rotate(360deg);opacity:0} }

.hero-content { position: relative; z-index: 2; padding: 24px 24px 20px; color: white; }
.hero-location { font-size: 13px; font-weight: 600; opacity: 0.85; display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
.hero-location svg { width: 13px; height: 13px; fill: white; opacity: 0.7; }
.hero-city { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 12px; }
.hero-temp { font-size: 80px; font-weight: 900; letter-spacing: -4px; line-height: 1; margin-bottom: 4px; }
.hero-temp sup { font-size: 32px; font-weight: 700; vertical-align: top; margin-top: 12px; }
.hero-desc { font-size: 16px; font-weight: 600; opacity: 0.9; margin-bottom: 16px; }

.hero-stats { display: flex; gap: 0; }
.hero-stat { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 6px; background: rgba(255,255,255,0.12); backdrop-filter: blur(8px); border-radius: 12px; margin-right: 8px; }
.hero-stat:last-child { margin-right: 0; }
.hero-stat-icon { font-size: 16px; }
.hero-stat-val { font-size: 13px; font-weight: 700; color: white; }
.hero-stat-label { font-size: 10px; font-weight: 500; opacity: 0.7; color: white; }

/* Hero skeleton */
.hero-skeleton { display: flex; flex-direction: column; gap: 12px; padding: 28px 24px; }
.skel { background: rgba(255,255,255,0.2); border-radius: 8px; animation: shimmer 1.5s infinite; }
@keyframes shimmer { 0%,100%{opacity:0.5} 50%{opacity:1} }
.skel-sm { height: 14px; width: 100px; }
.skel-lg { height: 72px; width: 160px; }
.skel-md { height: 16px; width: 140px; }

/* ── Search bar ── */
.search-wrap { margin: 14px 16px 0; position: relative; }
.search-input {
  width: 100%; background: var(--surface); border: 1.5px solid var(--border);
  color: var(--text); font-family: 'Outfit', sans-serif; font-size: 14px;
  padding: 12px 14px 12px 42px; border-radius: 14px; outline: none;
  box-shadow: var(--shadow-sm); transition: all 0.18s;
}
.search-input:focus { border-color: #1a6dd4; box-shadow: 0 0 0 3px rgba(26,109,212,0.1); }
.search-input::placeholder { color: var(--text-3); }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; opacity: 0.35; pointer-events: none; }
.search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: var(--surface2); border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; cursor: pointer; color: var(--text-3); display: none; align-items: center; justify-content: center; }
.search-clear.visible { display: flex; }

.search-results {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 50;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; box-shadow: var(--shadow-lg); overflow: hidden; display: none;
}
.search-results.open { display: block; }
.search-result-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.12s; }
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--surface2); }
.sri-icon { font-size: 18px; flex-shrink: 0; }
.sri-text .sri-name { font-size: 14px; font-weight: 700; }
.sri-text .sri-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; }
.search-msg { padding: 16px; text-align: center; font-size: 13px; color: var(--text-3); }

/* ── Unit toggle ── */
.unit-row { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 10px 20px 4px; }
.unit-label { font-size: 11px; font-weight: 600; color: var(--text-3); }
.unit-toggle { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-sm); }
.unit-btn { padding: 5px 12px; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; border: none; background: none; color: var(--text-3); transition: all 0.15s; }
.unit-btn.active { background: #1a6dd4; color: white; border-radius: 20px; }

/* ── Sections ── */
.section-pad { padding: 16px 16px 0; }
.section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-3); margin-bottom: 10px; padding: 0 4px; }

/* ── Hourly forecast strip ── */
.hourly-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
.hourly-scroll::-webkit-scrollbar { display: none; }
.hourly-track { display: flex; gap: 8px; width: max-content; padding: 0 4px; }
.hour-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; box-shadow: var(--shadow-sm);
  padding: 12px 14px; display: flex; flex-direction: column; align-items: center; gap: 6px;
  min-width: 64px; transition: all 0.15s; cursor: default;
}
.hour-card.now { background: linear-gradient(145deg, var(--sky1), var(--sky2)); border-color: transparent; box-shadow: 0 4px 14px rgba(26,109,212,0.3); }
.hour-time { font-size: 11px; font-weight: 600; color: var(--text-3); }
.hour-card.now .hour-time { color: rgba(255,255,255,0.75); }
.hour-icon { font-size: 20px; }
.hour-temp { font-size: 14px; font-weight: 800; }
.hour-card.now .hour-temp { color: white; }
.hour-rain { font-size: 10px; font-weight: 600; color: #4f8ef7; }
.hour-card.now .hour-rain { color: rgba(255,255,255,0.8); }

/* ── 7-day forecast ── */
.forecast-list { display: flex; flex-direction: column; gap: 8px; }
.day-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; box-shadow: var(--shadow-sm);
  display: flex; align-items: center; padding: 12px 16px; gap: 12px;
  transition: all 0.18s; cursor: default;
}
.day-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.day-name { font-size: 13px; font-weight: 700; width: 48px; flex-shrink: 0; }
.day-icon { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
.day-desc { font-size: 11px; color: var(--text-3); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-temps { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.day-high { font-size: 14px; font-weight: 800; }
.day-low { font-size: 13px; font-weight: 500; color: var(--text-3); }
.day-rain-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.day-rain-fill { height: 100%; background: linear-gradient(90deg, #4f8ef7, #7cbeff); border-radius: 2px; transition: width 0.8s ease; }

/* ── Saved locations ── */
.locations-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.loc-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  box-shadow: var(--shadow-sm); padding: 14px; cursor: pointer;
  transition: all 0.18s; position: relative; overflow: hidden;
}
.loc-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--sky1), var(--sky2));
  opacity: 0; transition: opacity 0.2s;
}
.loc-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.loc-card:hover::before { opacity: 0.06; }
.loc-card-name { font-size: 14px; font-weight: 700; color: var(--text); position: relative; }
.loc-card-country { font-size: 11px; color: var(--text-3); margin-top: 2px; position: relative; }
.loc-card-temp { font-size: 28px; font-weight: 900; letter-spacing: -1px; margin-top: 8px; position: relative; }
.loc-card-desc { font-size: 11px; color: var(--text-3); margin-top: 2px; position: relative; display: flex; align-items: center; gap: 4px; }
.loc-card-del {
  position: absolute; top: 8px; right: 8px; z-index: 2;
  background: rgba(0,0,0,0.06); border: none; border-radius: 50%;
  width: 22px; height: 22px; font-size: 10px; cursor: pointer;
  color: var(--text-3); display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; opacity: 0;
}
.loc-card:hover .loc-card-del { opacity: 1; }
.loc-card-del:hover { background: #fee; color: #e53; }

.add-location-btn {
  background: var(--surface); border: 1.5px dashed var(--border);
  border-radius: 16px; padding: 20px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
  color: var(--text-3); font-size: 12px; font-weight: 600; transition: all 0.15s;
  min-height: 100px;
}
.add-location-btn:hover { border-color: #1a6dd4; color: #1a6dd4; background: rgba(26,109,212,0.04); }
.add-location-btn .plus { font-size: 22px; }

/* ── GPS button ── */
.gps-btn {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 12px 16px; cursor: pointer;
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
  color: var(--text-2); transition: all 0.18s; box-shadow: var(--shadow-sm);
  width: 100%;
}
.gps-btn:hover { border-color: #1a6dd4; color: #1a6dd4; background: rgba(26,109,212,0.04); }
.gps-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.gps-btn .gps-sub { font-size: 11px; font-weight: 400; color: var(--text-3); margin-top: 1px; }

/* ── Toast ── */
.toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(10px); background: rgba(13,13,26,0.92); backdrop-filter: blur(20px); color: #fff; font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: 20px; pointer-events: none; opacity: 0; transition: opacity 0.2s, transform 0.2s; white-space: nowrap; z-index: 300; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Footer ── */
.footer { text-align: center; padding: 12px 0 28px; font-size: 11px; color: var(--text-3); margin-top: auto; }
.footer a { color: #1a6dd4; text-decoration: none; }

/* ── Cookie ── */
.cookie-banner { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.96); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; z-index: 200; box-shadow: 0 -4px 20px rgba(0,0,0,0.08); }
.cookie-banner p { font-size: 12px; color: var(--text-2); line-height: 1.5; }
.cookie-btn { flex-shrink: 0; background: #1a6dd4; color: white; border: none; border-radius: 20px; padding: 8px 18px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Outfit', sans-serif; }

@media (max-width: 380px) { .locations-grid { grid-template-columns: 1fr; } .hero-temp { font-size: 64px; } }
</style>

<body>
<div class="shell">

  <!-- Status bar -->
  <div class="statusbar">
    <span class="time" id="clock">9:41</span>
    <div class="icons">
      <svg viewBox="0 0 24 24"><rect x="1" y="14" width="3" height="7" rx="1"/><rect x="6" y="10" width="3" height="11" rx="1"/><rect x="11" y="6" width="3" height="15" rx="1"/><rect x="16" y="2" width="3" height="19" rx="1" opacity="0.3"/></svg>
      <svg viewBox="0 0 24 24"><path d="M12 18.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3zm-4.95-2.55a7 7 0 019.9 0l1.41-1.41a9 9 0 00-12.72 0l1.41 1.41zm-3.54-3.54a12 12 0 0116.98 0l1.41-1.41A14 14 0 003.1 10.99l1.41 1.42z"/></svg>
      <svg viewBox="0 0 24 24"><rect x="1" y="7" width="18" height="10" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="2" y="8" width="14" height="8" rx="1.2" fill="currentColor"/><path d="M20 10v4a2 2 0 000-4z"/></svg>
    </div>
  </div>

  <!-- Top nav -->
  <div class="topnav">
    <a class="back-btn" href="./index.html">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      guicks
    </a>
    <div style="width:80px"></div>
  </div>

  <!-- Hero card -->
  <div class="hero-card" id="heroCard">
    <div class="hero-bg">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
      <div class="rain-wrap" id="rainWrap"></div>
      <div class="snow-wrap" id="snowWrap"></div>
    </div>
    <div class="hero-content" id="heroContent">
      <div class="hero-skeleton">
        <div class="skel skel-sm"></div>
        <div class="skel skel-lg"></div>
        <div class="skel skel-md"></div>
      </div>

  </div>

  <!-- Unit toggle -->
  <div class="unit-row">
    <span class="unit-label">Units</span>
    <div class="unit-toggle">
      <button class="unit-btn active" id="unitC" onclick="setUnit('C')">°C</button>
      <button class="unit-btn" id="unitF" onclick="setUnit('F')">°F</button>

  </div>

  <!-- Search -->
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="6"/><line x1="15.5" y1="15.5" x2="20" y2="20"/></svg>
    <input class="search-input" id="searchInput" placeholder="Search city — London, Tokyo, New York…" oninput="onSearch(this.value)" autocomplete="off" />

<div class="cookie-banner" id="cookieBanner">
  <p>🍪 This website uses cookies to analyze traffic with Google Analytics.</p>
  <button class="cookie-btn" onclick="acceptCookies()">Accept</button>

<script>
// ── Clock ──
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}
updateClock(); setInterval(updateClock, 10000);

// ── Cookie ──
if (localStorage.getItem('cookiesAccepted')) document.getElementById('cookieBanner').style.display = 'none';
function acceptCookies() {
  localStorage.setItem('cookiesAccepted','true');
  const b = document.getElementById('cookieBanner');
  b.style.transition='opacity 0.3s,transform 0.3s'; b.style.opacity='0'; b.style.transform='translateY(20px)';
  setTimeout(()=>b.style.display='none',300);
}

// ── Toast ──
let toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove('show'), 2400);
}

// ── State ──
const LOCATIONS_KEY = 'guicks_weather_locations_v1';
const UNIT_KEY = 'guicks_weather_unit';
let unit = localStorage.getItem(UNIT_KEY) || 'C';
let savedLocations = [];
let currentLocation = null;

function loadLocations() {
  try { savedLocations = JSON.parse(localStorage.getItem(LOCATIONS_KEY)) || []; } catch { savedLocations = []; }
}
function saveLocations() { localStorage.setItem(LOCATIONS_KEY, JSON.stringify(savedLocations)); }

// ── Weather code → emoji + description ──
const WX = {
  0:  { icon:'☀️',  desc:'Clear sky',           sky:['#1a6dd4','#5ba5f5','#a8d4ff'] },
  1:  { icon:'🌤️', desc:'Mostly clear',         sky:['#1a6dd4','#5ba5f5','#b8d8f0'] },
  2:  { icon:'⛅',  desc:'Partly cloudy',        sky:['#3a7cb8','#7ab0d4','#b0c8e0'] },

function getWx(code) { return WX[code] || WX[0]; }

// ── Convert temp ──
function toUnit(c) { return unit === 'F' ? Math.round(c * 9/5 + 32) : Math.round(c); }
function unitSuffix() { return unit === 'F' ? '°F' : '°C'; }

function setUnit(u) {
  unit = u; localStorage.setItem(UNIT_KEY, u);
  document.getElementById('unitC').classList.toggle('active', u==='C');
  document.getElementById('unitF').classList.toggle('active', u==='F');
  if (currentLocation) loadWeather(currentLocation);
  renderSavedLocations();
}

// ── Weather API ──
async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,precipitation_probability&hourly=temperature_2m,precipitation_probability,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=7&wind_speed_unit=kmh`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Weather fetch failed');
  return res.json();
}

async function fetchGeocode(q) {
  const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=8&language=en&format=json`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Geocode failed');
  return res.json();
}

// ── Sky theming ──
function setSky(wx, storm) {
  const card = document.getElementById('heroCard');
  const sky = wx.sky;
  card.style.background = `linear-gradient(160deg, ${sky[0]}, ${sky[1]} 55%, ${sky[2]})`;
  // Rain
  const rainWrap = document.getElementById('rainWrap');
  rainWrap.classList.toggle('active', !!wx.rain);
  if (wx.rain && rainWrap.children.length === 0) {
    for (let i = 0; i < 30; i++) {
      const d = document.createElement('div');
      d.className = 'raindrop';
      d.style.cssText = `left:${Math.random()*100}%;height:${10+Math.random()*14}px;animation-duration:${0.5+Math.random()*0.8}s;animation-delay:${Math.random()*2}s;`;
      rainWrap.appendChild(d);
    }
  }
  // Snow
  const snowWrap = document.getElementById('snowWrap');
  snowWrap.classList.toggle('active', !!wx.snow);
  if (wx.snow && snowWrap.children.length === 0) {
    for (let i = 0; i < 20; i++) {
      const d = document.createElement('div');
      d.className = 'snowflake'; d.textContent = '❄';
      d.style.cssText = `left:${Math.random()*100}%;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s;font-size:${8+Math.random()*8}px;`;
      snowWrap.appendChild(d);
    }
  }
}

// ── Load weather for a location ──
async function loadWeather(loc) {
  currentLocation = loc;
  document.getElementById('heroContent').innerHTML = `<div class="hero-skeleton"><div class="skel skel-sm"></div><div class="skel skel-lg"></div><div class="skel skel-md"></div></div>`;
  document.getElementById('hourlySection').style.display = 'none';
  document.getElementById('dailySection').style.display = 'none';

  try {
    const data = await fetchWeather(loc.lat, loc.lon);
    const c = data.current;
    const wx = getWx(c.weather_code);
    setSky(wx);

    // Hero
    const temp = toUnit(c.temperature_2m);
    const feel = toUnit(c.apparent_temperature);
    document.getElementById('heroContent').innerHTML = `
      <div class="hero-location">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        ${esc(loc.country)}
      </div>
      <div class="hero-city">${esc(loc.name)}</div>
      <div class="hero-temp">${temp}<sup>${unitSuffix()}</sup></div>
      <div class="hero-desc">${wx.icon} ${wx.desc}</div>
      <div class="hero-stats">
        <div class="hero-stat"><span class="hero-stat-icon">🌡️</span><span class="hero-stat-val">${feel}°</span><span class="hero-stat-label">Feels like</span></div>
        <div class="hero-stat"><span class="hero-stat-icon">💧</span><span class="hero-stat-val">${c.relative_humidity_2m}%</span><span class="hero-stat-label">Humidity</span></div>
        <div class="hero-stat"><span class="hero-stat-icon">💨</span><span class="hero-stat-val">${Math.round(c.wind_speed_10m)} km/h</span><span class="hero-stat-label">Wind</span></div>
        <div class="hero-stat"><span class="hero-stat-icon">🌂</span><span class="hero-stat-val">${c.precipitation_probability ?? 0}%</span><span class="hero-stat-label">Rain</span></div>
      </div>`;

    // Hourly (next 24h)
    const now = new Date();
    const hourlyHtml = data.hourly.time.slice(0, 48).map((t, i) => {
      const dt = new Date(t);
      if (dt < now) return '';
      const isNow = i === data.hourly.time.findIndex(t2 => new Date(t2) >= now);
      const hwx = getWx(data.hourly.weather_code[i]);
      return `<div class="hour-card${isNow?' now':''}">
        <div class="hour-time">${isNow ? 'Now' : dt.getHours().toString().padStart(2,'0')+':00'}</div>
        <div class="hour-icon">${hwx.icon}</div>
        <div class="hour-temp">${toUnit(data.hourly.temperature_2m[i])}°</div>
        <div class="hour-rain">${data.hourly.precipitation_probability[i]}%</div>
      </div>`;
    }).filter(Boolean).slice(0, 24).join('');
    document.getElementById('hourlyTrack').innerHTML = hourlyHtml;
    document.getElementById('hourlySection').style.display = 'block';

    // Daily
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const dailyHtml = data.daily.time.map((t, i) => {
      const dt = new Date(t + 'T12:00:00');
      const dwx = getWx(data.daily.weather_code[i]);
      const rain = data.daily.precipitation_probability_max[i] || 0;
      return `<div class="day-card">
        <div class="day-name">${i===0?'Today':days[dt.getDay()]}</div>
        <div class="day-icon">${dwx.icon}</div>
        <div class="day-rain-bar"><div class="day-rain-fill" style="width:${rain}%"></div></div>
        <div class="day-desc">${dwx.desc}</div>
        <div class="day-temps">
          <span class="day-high">${toUnit(data.daily.temperature_2m_max[i])}°</span>
          <span class="day-low">${toUnit(data.daily.temperature_2m_min[i])}°</span>
        </div>
      </div>`;
    }).join('');
    document.getElementById('dailyList').innerHTML = dailyHtml;
    document.getElementById('dailySection').style.display = 'block';

    // Cache temp for saved locations display
    loc._temp = temp;
    loc._wxIcon = wx.icon;
    loc._wxDesc = wx.desc;

  } catch(e) {
    document.getElementById('heroContent').innerHTML = `<div style="padding:24px;color:white;text-align:center;"><div style="font-size:32px;margin-bottom:8px">⚠️</div><div style="font-weight:700">Failed to load weather</div><div style="opacity:0.7;font-size:13px;margin-top:4px">Check your connection and try again</div></div>`;
  }
}

// ── Saved locations ──
async function renderSavedLocations() {
  const grid = document.getElementById('locationsGrid');
  if (!savedLocations.length) {
    grid.innerHTML = `<div class="add-location-btn" onclick="document.getElementById('searchInput').focus()"><div class="plus">+</div><div>Add a location</div></div>`;
    return;
  }

  grid.innerHTML = savedLocations.map((loc, i) => `
    <div class="loc-card" onclick="loadWeather(savedLocations[${i}])">
      <button class="loc-card-del" onclick="event.stopPropagation();removeLocation(${i})" title="Remove">✕</button>
      <div class="loc-card-name">${esc(loc.name)}</div>
      <div class="loc-card-country">${esc(loc.country)}</div>
      <div class="loc-card-temp">${loc._temp != null ? loc._temp + (unit==='F'?'°F':'°C') : '—'}</div>
      <div class="loc-card-desc">${loc._wxIcon||'🌤️'} ${esc(loc._wxDesc||'Loading…')}</div>
    </div>`).join('') +
    `<div class="add-location-btn" onclick="document.getElementById('searchInput').focus()"><div class="plus">+</div><div>Add location</div></div>`;

  // Refresh temps in background
  savedLocations.forEach(async (loc, i) => {
    try {
      const data = await fetchWeather(loc.lat, loc.lon);
      const c = data.current;
      const wx = getWx(c.weather_code);
      loc._temp = toUnit(c.temperature_2m);
      loc._wxIcon = wx.icon;
      loc._wxDesc = wx.desc;
      saveLocations();
      renderSavedLocations();
    } catch {}
  });
}

function addLocation(loc) {
  if (savedLocations.find(l => l.lat === loc.lat && l.lon === loc.lon)) {
    showToast(`${loc.name} already saved`); return;
  }
  savedLocations.push(loc);
  saveLocations();
  renderSavedLocations();
  showToast(`📍 ${loc.name} saved!`);
}

function removeLocation(i) {
  const name = savedLocations[i].name;
  savedLocations.splice(i, 1);
  saveLocations();
  renderSavedLocations();
  showToast(`Removed ${name}`);
}

// ── Search ──
let searchTimer;
function onSearch(val) {
  document.getElementById('searchClear').classList.toggle('visible', val.length > 0);
  clearTimeout(searchTimer);
  if (!val.trim()) { document.getElementById('searchResults').classList.remove('open'); return; }
  document.getElementById('searchResults').innerHTML = '<div class="search-msg">Searching…</div>';
  document.getElementById('searchResults').classList.add('open');
  searchTimer = setTimeout(() => doSearch(val), 400);
}

async function doSearch(q) {
  try {
    const data = await fetchGeocode(q);
    const results = data.results || [];
    if (!results.length) {
      document.getElementById('searchResults').innerHTML = '<div class="search-msg">No cities found</div>';
      return;
    }
    document.getElementById('searchResults').innerHTML = results.map((r, i) => {
      const country = [r.admin1, r.country].filter(Boolean).join(', ');
      const code = r.country_code?.toLowerCase() || '';
      return `<div class="search-result-item" onclick="selectResult(${i})">
        <div class="sri-icon">🌍</div>
        <div class="sri-text">
          <div class="sri-name">${esc(r.name)}</div>
          <div class="sri-sub">${esc(country)}</div>
        </div>
      </div>`;
    }).join('');
    // Store results for selection
    window._searchResults = results;
  } catch {
    document.getElementById('searchResults').innerHTML = '<div class="search-msg">Search failed. Try again.</div>';
  }
}

function selectResult(i) {
  const r = window._searchResults[i];
  const loc = {
    name: r.name,
    country: [r.admin1, r.country].filter(Boolean).join(', '),
    lat: r.latitude,
    lon: r.longitude,
  };
  clearSearch();
  addLocation(loc);
  loadWeather(loc);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  document.getElementById('searchResults').classList.remove('open');
  window._searchResults = [];
}

document.addEventListener('click', e => {
  if (!document.getElementById('searchInput').contains(e.target) &&
      !document.getElementById('searchResults').contains(e.target)) {
    document.getElementById('searchResults').classList.remove('open');
  }
});

// ── GPS location ──
function useLocation() {
  if (!navigator.geolocation) { showToast('Geolocation not supported'); return; }
  showToast('📍 Detecting location…');
  navigator.geolocation.getCurrentPosition(async pos => {
    const lat = pos.coords.latitude.toFixed(4);
    const lon = pos.coords.longitude.toFixed(4);
    // Reverse geocode using open-meteo geocoding (search near coords)
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=en`);
      const geo = await res.json();
      const city = geo.address?.city || geo.address?.town || geo.address?.village || geo.address?.county || 'My Location';
      const country = geo.address?.country || '';
      const loc = { name: city, country, lat: parseFloat(lat), lon: parseFloat(lon) };
      addLocation(loc);
      loadWeather(loc);
    } catch {
      const loc = { name: 'My Location', country: '', lat: parseFloat(lat), lon: parseFloat(lon) };
      loadWeather(loc);
    }
  }, () => showToast('Location access denied'));
}

// ── Escape HTML ──
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init ──
loadLocations();
renderSavedLocations();

// Load first saved location, or request GPS, falling back to Las Palmas
const DEFAULT_LOC = { name: 'Las Palmas', country: 'Spain', lat: 28.1235, lon: -15.4363 };

if (savedLocations.length > 0) {
  loadWeather(savedLocations[0]);
} else {
  // First visit — request location permission immediately
  if (navigator.geolocation) {
    showToast('📍 Detecting your location…');
    navigator.geolocation.getCurrentPosition(
      async pos => {
        const lat = pos.coords.latitude.toFixed(4);
        const lon = pos.coords.longitude.toFixed(4);
        try {
          const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=en`);
          const geo = await res.json();
          const city = geo.address?.city || geo.address?.town || geo.address?.village || geo.address?.county || 'My Location';
          const country = geo.address?.country || '';
          const loc = { name: city, country, lat: parseFloat(lat), lon: parseFloat(lon) };
          addLocation(loc);
          loadWeather(loc);
        } catch {
          const loc = { name: 'My Location', country: '', lat: parseFloat(lat), lon: parseFloat(lon) };
          loadWeather(loc);
        }
      },
      () => {
        // Permission denied — fall back to Las Palmas
        loadWeather(DEFAULT_LOC);
      },
      { timeout: 10000 }
    );
  } else {
    loadWeather(DEFAULT_LOC);
  }
}
