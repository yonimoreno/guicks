<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Outfit',sans-serif;
  background:#07070d;
  color:#f0f0f5;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 55% 50% at 5% 0%,rgba(20,90,40,.4) 0%,transparent 65%),
    radial-gradient(ellipse 45% 45% at 95% 100%,rgba(10,60,30,.3) 0%,transparent 65%);
}

.shell{
  position:relative;z-index:1;
  max-width:640px;margin:0 auto;
  display:flex;flex-direction:column;
  min-height:100vh;
  padding-bottom:140px; /* space for filter bar */
}

/* ── Status bar ── */
.statusbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 20px 0;font-size:13px;font-weight:700;color:#f0f0f5;
}
.sb-time{font-size:16px;font-weight:800;}
.sb-icons{display:flex;gap:5px;align-items:center;}
.statusbar svg{width:16px;height:16px;fill:#f0f0f5;}

/* ── Top nav ── */
.topnav{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px 0;
}
.back-btn{
  display:inline-flex;align-items:center;gap:4px;
  color:rgba(134,239,172,.9);font-size:15px;font-weight:700;
  text-decoration:none;padding:6px 10px 6px 4px;
  border-radius:10px;transition:background .15s;
}
.back-btn:hover{background:rgba(134,239,172,.1);}
.back-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.topnav-right{display:flex;gap:8px;align-items:center;}
.icon-btn{
  width:34px;height:34px;border-radius:10px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.5);font-size:14px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;
}
.icon-btn:hover{background:rgba(134,239,172,.15);border-color:rgba(134,239,172,.3);color:rgba(134,239,172,.9);}
.icon-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── App header ── */
.app-header{
  padding:8px 20px 14px;
  display:flex;align-items:center;gap:14px;
}
.app-icon{
  width:50px;height:50px;border-radius:14px;flex-shrink:0;
  background:linear-gradient(145deg,#0d4a20,#1a8a40);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(26,138,64,.4),inset 0 1px 0 rgba(255,255,255,.15);
}
.app-icon svg{width:26px;height:26px;}
.app-title{font-size:22px;font-weight:800;letter-spacing:-.5px;}
.app-sub{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px;}

/* ── Add item input ── */
.input-wrap{
  margin:0 14px 10px;
  background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.1);
  border-radius:16px;
  padding:4px 4px 4px 16px;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 4px 20px rgba(0,0,0,.2);
  transition:border-color .15s,box-shadow .15s;
}
.input-wrap:focus-within{
  border-color:rgba(134,239,172,.4);
  box-shadow:0 4px 20px rgba(0,0,0,.2),0 0 0 3px rgba(26,138,64,.12);
}
.item-input{
  flex:1;background:none;border:none;outline:none;
  font-family:'Outfit',sans-serif;font-size:16px;font-weight:500;
  color:#f0f0f5;padding:10px 0;
}
.item-input::placeholder{color:rgba(255,255,255,.25);}
.add-btn{
  width:40px;height:40px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,#0d6b2a,#1a8a40);
  border:none;color:#fff;font-size:22px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform .12s,box-shadow .12s;
  box-shadow:0 3px 10px rgba(26,138,64,.4);
}
.add-btn:hover{transform:scale(1.06);box-shadow:0 5px 14px rgba(26,138,64,.5);}
.add-btn:active{transform:scale(.96);}

/* ── Section picker (shown when typing) ── */
.section-picker{
  margin:0 14px 10px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:8px;
  display:flex;flex-wrap:wrap;gap:6px;
  display:none;
}
.section-picker.visible{display:flex;}
.section-opt{
  display:flex;align-items:center;gap:5px;
  padding:6px 11px;border-radius:20px;
  border:1.5px solid rgba(255,255,255,.1);
  background:none;
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;
  color:rgba(255,255,255,.5);cursor:pointer;
  transition:all .15s;
}
.section-opt:hover{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.9);}
.section-opt.active{color:#fff;border-color:transparent;}
.sect-icon{font-size:13px;}

.autocat-hint{
  margin:-4px 14px 8px;
  font-size:11.5px;font-weight:600;
  color:rgba(255,255,255,.35);
  min-height:16px;
  transition:opacity .2s;
  padding:0 4px;
}
html.guicks-light .autocat-hint{color:rgba(0,0,0,.35);}
/* ── Summary bar ── */
.summary-bar{
  margin:0 14px 8px;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px;
  font-size:12px;font-weight:600;
  color:rgba(255,255,255,.4);
}
.summary-counts{display:flex;gap:14px;}
.summary-count-item{display:flex;align-items:center;gap:5px;}
.summary-dot{width:7px;height:7px;border-radius:50%;}
.clear-done-btn{
  background:none;border:none;cursor:pointer;
  font-size:12px;font-weight:700;
  color:rgba(255,255,255,.3);
  font-family:'Outfit',sans-serif;
  transition:color .15s;
  padding:2px 0;
}
.clear-done-btn:hover{color:#ff6b6b;}

/* ── Items list ── */
.items-wrap{padding:0 14px;flex:1;}

.section-group-label{
  font-size:10px;font-weight:800;
  letter-spacing:.8px;text-transform:uppercase;
  color:rgba(255,255,255,.28);
  padding:12px 4px 4px;
}

.item-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;
  background:rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.07);
  border-radius:13px;
  margin-bottom:6px;
  cursor:pointer;
  transition:all .15s;
  user-select:none;
}
.item-row:hover{background:rgba(255,255,255,.08);}
.item-row.done{opacity:.45;}
.item-row.done .item-name{text-decoration:line-through;}

.check-box{
  width:22px;height:22px;border-radius:7px;
  border:2px solid rgba(255,255,255,.2);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;
}
.item-row.done .check-box{
  background:#34c759;border-color:#34c759;
}
.check-box svg{
  width:12px;height:12px;
  fill:none;stroke:#fff;stroke-width:3;
  stroke-linecap:round;stroke-linejoin:round;
  opacity:0;transform:scale(.5);
  transition:opacity .15s,transform .15s;
}
.item-row.done .check-box svg{opacity:1;transform:scale(1);}

.item-info{flex:1;min-width:0;}
.item-name{font-size:15px;font-weight:600;color:#f0f0f5;}
.item-section-tag{font-size:11px;color:rgba(255,255,255,.35);margin-top:1px;}

.item-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.qty-wrap{display:flex;align-items:center;gap:4px;}
.qty-btn{
  width:24px;height:24px;border-radius:7px;
  background:none;border:none;cursor:pointer;
  font-size:15px;font-weight:700;
  color:rgba(255,255,255,.35);
  display:flex;align-items:center;justify-content:center;
  transition:color .12s;line-height:1;
}
.qty-btn:hover{color:#f0f0f5;}
.item-qty{
  font-size:13px;font-weight:700;
  min-width:18px;text-align:center;
  color:rgba(255,255,255,.55);
  border:1px solid rgba(255,255,255,.1);
  border-radius:6px;padding:1px 6px;
  background:rgba(255,255,255,.05);
}
.del-btn{
  width:28px;height:28px;border-radius:8px;
  background:none;border:none;cursor:pointer;
  font-size:14px;opacity:.25;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .12s,background .12s;
}
.del-btn:hover{opacity:.8;background:rgba(255,59,48,.15);}

/* ── Empty state ── */
.empty-state{
  text-align:center;padding:48px 24px;
  color:rgba(255,255,255,.22);
  font-size:14px;font-style:italic;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.empty-state .empty-icon{font-size:40px;opacity:.5;}

/* ── Filter bar (fixed bottom) ── */
.filter-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(7,7,13,.88);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,.08);
  padding:10px 14px 20px;
}
.filter-scroll{
  display:flex;gap:7px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  padding-bottom:2px;
}
.filter-scroll::-webkit-scrollbar{display:none;}
.filter-tag{
  display:flex;align-items:center;gap:5px;
  white-space:nowrap;flex-shrink:0;
  padding:7px 13px;border-radius:20px;
  border:1.5px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);
  font-family:'Outfit',sans-serif;
  font-size:12px;font-weight:700;
  color:rgba(255,255,255,.5);
  cursor:pointer;transition:all .15s;
}
.filter-tag:hover{
  border-color:rgba(255,255,255,.22);
  color:#f0f0f5;
}
.filter-tag.active{
  color:#fff;border-color:transparent;
  box-shadow:0 3px 10px rgba(0,0,0,.3);
}
.filter-tag .ft-icon{font-size:13px;}
.filter-tag .ft-count{
  font-size:10px;font-weight:800;
  background:rgba(255,255,255,.2);
  border-radius:20px;padding:1px 6px;
  min-width:18px;text-align:center;
}
.filter-tag.active .ft-count{background:rgba(255,255,255,.25);}

/* ── Toast ── */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);
  background:rgba(20,20,36,.95);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);color:#fff;
  font-size:13px;font-weight:500;padding:10px 20px;
  border-radius:20px;pointer-events:none;
  opacity:0;transition:opacity .2s,transform .2s;
  white-space:nowrap;z-index:9999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>

</head>

<script>
/* ═══════════════════════════════════════
   SECTIONS CONFIG
═══════════════════════════════════════ */
const SECTIONS = [
  { id:'produce',   labelKey:'shopSecProduce',   icon:'🥦', color:'#22c55e' },
  { id:'dairy',     labelKey:'shopSecDairy',     icon:'🥛', color:'#60a5fa' },
  { id:'meat',      labelKey:'shopSecMeat',      icon:'🥩', color:'#f87171' },
  { id:'bakery',    labelKey:'shopSecBakery',    icon:'🍞', color:'#fb923c' },
  { id:'frozen',    labelKey:'shopSecFrozen',    icon:'🧊', color:'#38bdf8' },
  { id:'drinks',    labelKey:'shopSecDrinks',    icon:'🥤', color:'#a78bfa' },
  { id:'snacks',    labelKey:'shopSecSnacks',    icon:'🍿', color:'#fbbf24' },
  { id:'cleaning',  labelKey:'shopSecCleaning',  icon:'🧹', color:'#34d399' },
  { id:'personal',  labelKey:'shopSecPersonal',  icon:'🧴', color:'#f472b6' },
  { id:'pantry',    labelKey:'shopSecPantry',    icon:'🫙', color:'#d97706' },
  { id:'other',     labelKey:'shopSecOther',     icon:'🛒', color:'#94a3b8' },
];

function getSections(){ return SECTIONS.map(s=>({...s, label: GI.get(s.labelKey)||s.labelKey})); }
function getSectMap(){ const m={}; getSections().forEach(s=>m[s.id]=s); return m; }

/* ═══════════════════════════════════════
   DATA
═══════════════════════════════════════ */
const KEY = 'guicks_shopping_v1';
let items = [];
let activeFilter = 'all'; // 'all' or section id
let selectedSection = SECTIONS[0].id;

function load(){ try{ items=JSON.parse(localStorage.getItem(KEY))||[]; }catch(e){ items=[]; } }
function save(){ localStorage.setItem(KEY, JSON.stringify(items)); }

/* ═══════════════════════════════════════
   RENDER
═══════════════════════════════════════ */
function render(){
  renderSectionPicker();
  renderFilterBar();
  renderItems();
  renderSummary();
  updateSub();
}

function renderSectionPicker(){
  const wrap = document.getElementById('section-picker');
  wrap.innerHTML = getSections().map(s=>`
    <button class="section-opt${s.id===selectedSection?' active':''}"
      style="${s.id===selectedSection?`background:${s.color};border-color:${s.color}`:'border-color:rgba(255,255,255,.1)'}"
      onclick="pickSection('${s.id}')">
      <span class="sect-icon">${s.icon}</span>${s.label}
    </button>`).join('');
}

function renderFilterBar(){
  const scroll = document.getElementById('filter-scroll');
  const totalCount = items.length;
  const doneCount  = items.filter(i=>i.done).length;

  let tags = `<div class="filter-tag${activeFilter==='all'?' active':''}"
    style="${activeFilter==='all'?'background:linear-gradient(135deg,#0d6b2a,#1a8a40)':''}"
    onclick="setFilter('all')">
    <span class="ft-icon">🛒</span> ${GI.get('all')}
    <span class="ft-count">${totalCount}</span>
  </div>`;

  getSections().forEach(s=>{
    const count = items.filter(i=>i.section===s.id).length;
    if(count === 0) return;
    const isActive = activeFilter===s.id;
    tags += `<div class="filter-tag${isActive?' active':''}"
      style="${isActive?`background:${s.color}`:'border-color:rgba(255,255,255,.1)'}"
      onclick="setFilter('${s.id}')">
      <span class="ft-icon">${s.icon}</span> #${s.label}
      <span class="ft-count">${count}</span>
    </div>`;
  });

  scroll.innerHTML = tags;
}

function renderItems(){
  const wrap = document.getElementById('items-wrap');
  const SECT_MAP = getSectMap();
  let filtered = activeFilter==='all' ? items : items.filter(i=>i.section===activeFilter);

  if(!filtered.length){
    const msg = activeFilter==='all'
      ? GI.get('shopEmpty').replace('\\n','<br>')
      : GI.get('shopNoSection').replace('{section}', SECT_MAP[activeFilter]?.label || activeFilter);
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><div>${msg}</div></div>`;
    return;
  }

  // Group by section
  const groups = {};
  filtered.forEach(item=>{
    if(!groups[item.section]) groups[item.section]=[];
    groups[item.section].push(item);
  });

  // Sort: pending first within each group
  let html = '';
  const sectionOrder = getSections().map(s=>s.id).filter(id=>groups[id]);
  sectionOrder.forEach(sid=>{
    const s = SECT_MAP[sid];
    const grpItems = groups[sid].sort((a,b)=>a.done-b.done);
    if(activeFilter==='all'){
      html+=`<div class="section-group-label">${s.icon} ${s.label}</div>`;
    }
    grpItems.forEach(item=>{
      html += renderItemRow(item);
    });
  });

  wrap.innerHTML = html;
}

function renderItemRow(item){
  const SECT_MAP = getSectMap();
  const s = SECT_MAP[item.section] || SECT_MAP['other'];
  return `<div class="item-row${item.done?' done':''}" id="row-${item.id}">
    <div class="check-box" onclick="toggleDone('${item.id}')">
      <svg viewBox="0 0 12 10"><polyline points="1 5 4 8 11 1"/></svg>
    </div>
    <div class="item-info" onclick="toggleDone('${item.id}')">
      <div class="item-name">${escHtml(item.name)}</div>
      <div class="item-section-tag" style="color:${s.color}aa">${s.icon} #${s.label}</div>
    </div>
    <div class="item-right">
      <div class="qty-wrap">
        <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
        <div class="item-qty">${item.qty}</div>
        <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
      </div>
      <button class="del-btn" onclick="deleteItem('${item.id}')">✕</button>
    </div>
  </div>`;
}

function renderSummary(){
  const bar = document.getElementById('summary-bar');
  const total = items.length;
  const done  = items.filter(i=>i.done).length;
  if(!total){ bar.style.display='none'; return; }
  bar.style.display='flex';
  document.getElementById('summary-counts').innerHTML =
    `<div class="summary-count-item"><div class="summary-dot" style="background:#34c759"></div>${done} ${GI.get('shopDone')}</div>
     <div class="summary-count-item"><div class="summary-dot" style="background:#94a3b8"></div>${total-done} ${GI.get('shopLeft')}</div>`;
}

function updateSub(){
  document.getElementById('app-sub').textContent =
    items.length === 0 ? GI.get('shopEmpty').split('\n')[0] :
    `${items.length} ${GI.get(items.length!==1?'shopItems':'shopItem')}`;
}

/* ═══════════════════════════════════════
   ACTIONS
═══════════════════════════════════════ */
function addItem(){
  const input = document.getElementById('item-input');
  const name  = input.value.trim();
  if(!name) return;
  items.unshift({
    id: 'i'+Date.now(),
    name,
    section: selectedSection,
    qty: 1,
    done: false,
  });
  save();
  input.value='';
  hideSectionPicker();
  document.getElementById('autocat-hint').textContent = '';
  autocatActive = false;
  selectedSection = SECTIONS[0].id;
  render();
}

function toggleDone(id){
  const item = items.find(i=>i.id===id);
  if(item){ item.done=!item.done; save(); render(); }
}

function changeQty(id, delta){
  const item = items.find(i=>i.id===id);
  if(item){ item.qty=Math.max(1, item.qty+delta); save(); render(); }
}

function deleteItem(id){
  items = items.filter(i=>i.id!==id);
  save();
  render();
}

function clearDone(){
  const count = items.filter(i=>i.done).length;
  if(!count){ showToast(GI.get('shopNoCompleted')); return; }
  items = items.filter(i=>!i.done);
  save(); render();
  showToast(`🗑 ${GI.get('shopCleared').replace('{n}', count)}`);
}

function clearAll(){
  if(!items.length){ showToast(GI.get('shopAlreadyEmpty')); return; }
  if(!confirm(GI.get('shopConfirmClear').replace('{n}', items.length))) return;
  items=[];save();render();
  showToast('🗑 ' + GI.get('shopListCleared'));
}

function setFilter(f){
  activeFilter=f;
  render();
}

function pickSection(id){
  setSection(id, false);
}

let autocatActive = false; // true = autocat set the section, false = user manually set it

function detectSection(val) {
  const lower = val.toLowerCase().trim();
  // Split input into words for boundary matching
  const words = lower.split(/\s+/);
  for (const [section, keywords] of Object.entries(AUTOCAT_MAP)) {
    for (const kw of keywords) {
      // Full word match: keyword equals one of the typed words,
      // OR typed input starts with the keyword (handles e.g. "pollo a la plancha")
      // OR keyword is multi-word and is contained in input (e.g. "olive oil")
      const kwLower = kw.toLowerCase();
      if (kw.includes(' ')) {
        // Multi-word keyword: substring match is fine
        if (lower.includes(kwLower)) return section;
      } else {
        // Single-word keyword: must match a whole word in input
        if (words.some(w => w === kwLower || w.startsWith(kwLower) && kwLower.length >= 4)) return section;
      }
    }
  }
  return null;
}

function setSection(id, isAuto) {
  selectedSection = id;
  autocatActive = isAuto;
  renderSectionPicker();
  // Update hint
  const hint = document.getElementById('autocat-hint');
  if (isAuto) {
    const s = getSections().find(s => s.id === id);
    hint.textContent = s ? `${s.icon} ${GI.get('shopAutocat')} ${s.label}` : '';
  } else {
    hint.textContent = '';
  }
}

/* ═══════════════════════════════════════
   INPUT HANDLING
═══════════════════════════════════════ */
function onInputChange(){
  const val = document.getElementById('item-input').value.trim();
  const picker = document.getElementById('section-picker');
  if(val.length > 0){
    picker.classList.add('visible');
    // Only autocat if user hasn't manually picked
    if (autocatActive || selectedSection === SECTIONS[0].id) {
      const detected = detectSection(val);
      if (detected) {
        setSection(detected, true);
      } else if (autocatActive) {
        setSection(SECTIONS[0].id, true);
      }
    }
  } else {
    picker.classList.remove('visible');
    document.getElementById('autocat-hint').textContent = '';
    if (autocatActive) setSection(SECTIONS[0].id, true);
  }
}

function hideSectionPicker(){
  document.getElementById('section-picker').classList.remove('visible');
}

function onInputKey(e){
  if(e.key==='Enter') addItem();
  if(e.key==='Escape'){ document.getElementById('item-input').value=''; hideSectionPicker(); }
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let _tt;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2200);
}

function tickSB(){
  const n=new Date();
  document.getElementById('sb-time').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
tickSB(); setInterval(tickSB,10000);
